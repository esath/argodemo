name: CI – Build and push container image

on:
  push:
    branches:
      - main
      - dev1
    paths:
      - "app/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the updated image tag
      packages: write       # needed to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare branch-specific image tag and manifest path
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [ "${BRANCH}" = "main" ]; then
            IMAGE_TAG="sha-${SHORT_SHA}"
            MANIFEST_PATH="k8s/deployment.yaml"
            TAGS="${IMAGE_BASE}:${IMAGE_TAG},${IMAGE_BASE}:latest"
          elif [ "${BRANCH}" = "dev1" ]; then
            IMAGE_TAG="dev1-sha-${SHORT_SHA}"
            MANIFEST_PATH="k8s-dev1/deployment.yaml"
            TAGS="${IMAGE_BASE}:${IMAGE_TAG},${IMAGE_BASE}:dev1-latest"
          else
            echo "Unsupported branch: ${BRANCH}" >&2
            exit 1
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "manifest_path=${MANIFEST_PATH}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      # Update the image tag in the branch-specific deployment manifest so ArgoCD detects the change
      - name: Update image tag in deployment manifest
        id: update-tag
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}"
          sed -i "s|^[[:space:]]*image: .*|          image: ${IMAGE}|" "${{ steps.vars.outputs.manifest_path }}"
          echo "Updated image in ${{ steps.vars.outputs.manifest_path }} to ${IMAGE}"

      - name: Commit updated deployment manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update ${GITHUB_REF_NAME} image tag to ${{ steps.vars.outputs.image_tag }}"
          file_pattern: ${{ steps.vars.outputs.manifest_path }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
