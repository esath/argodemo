apiVersion: apps/v1
kind: Deployment
metadata:
  name: argodemo
  namespace: argodemo
  labels:
    app: argodemo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argodemo
  template:
    metadata:
      labels:
        app: argodemo
    spec:
      containers:
        - name: argodemo
          # The CI workflow updates this image tag on every push to main
          image: ghcr.io/esath/argodemo:sha-f0878e8
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
